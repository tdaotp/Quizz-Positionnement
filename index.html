<form id="quizForm">
  <input type="text" id="prenom" placeholder="Prénom" required>
  <input type="text" id="nom" placeholder="Nom" required>
  <input type="email" id="email" placeholder="Email professionnel" required>
  <button type="submit">Envoyer</button>
</form>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyPAivYrEDHK0zOW63yx-FaaLYUNbaPOatPs7b5h_ryVqq5Aq69I4qGxjQ1H7B_ZZDwow/exec";
document.getElementById("quizForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const data = {
    prenom: document.getElementById("prenom").value,
    nom: document.getElementById("nom").value,
    email: document.getElementById("email").value
  };
  await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });
  alert("Merci pour ta participation !");
});
</script>
